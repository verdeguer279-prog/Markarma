<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAD - Gestión de Cursos y Pagos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> 
  
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg-dark: #1a1a2e;
      --card-bg: #282844;
      --text-light: #e9e9f0;
      --accent-blue: #667eea;
      --accent-purple: #764ba2;
      --accent-gradient: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      --accent-red: #dc3545;
      --accent-green: #28a745;
      --accent-orange: #ff9800;
      --header-bg: #3e3e5c;
    }
    
    html { box-sizing: border-box; overflow-x: hidden; }
    *, *::before, *::after { box-sizing: inherit; }
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: linear-gradient(135deg,#667eea,#764ba2); 
      color: var(--text-light); 
      margin:0; 
      padding-bottom: 50px;
    }
    .container { max-width:1400px; margin:30px auto; padding:0 16px; }
    h1 { text-align:center; margin-bottom:20px; font-size:2.2rem; font-weight:700; color:#fff; }
    
    .card { background-color: rgba(0,0,0,0.55); border-radius:12px; padding:25px; margin-bottom:25px; box-shadow:0 6px 16px rgba(0,0,0,0.3); }

    .toggle-form-container { 
        text-align:center; margin-bottom:15px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
    }

    #btnToggleForm, #btnMainMenu { padding:12px 20px; font-size:0.95rem; border:none; border-radius:8px; cursor:pointer; font-weight:600; transition:0.3s; }
    #btnToggleForm { background-image: var(--accent-gradient); color: var(--text-light); }
    #btnMainMenu { background-color: var(--accent-orange); color: #333; }

    /* FORMULARIO MODAL */
    #data-entry-form { 
        position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1001; 
        display: none; opacity: 0; transition: opacity .3s ease;
        overflow-y: auto; align-items: flex-start; justify-content: center;
        padding: 20px 10px;
    }
    #data-entry-form.visible { display: flex; opacity: 1; }
    
    .modal-content-wrapper {
        background-color: var(--card-bg); border-radius: 12px; padding: 25px;
        width: 100%; max-width: 1000px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        margin-bottom: 50px;
    }

    /* Form Grid Desktop */
    .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: end; margin-bottom: 15px; } 
    .form-group { display: flex; flex-direction: column; }
    .form-group label { margin-bottom: 5px; color: #ccc; font-size: 0.85rem; }
    
    input, select, textarea {
      padding: 10px; border-radius: 6px; border: 1px solid #555; background-color: #fff; 
      color: #333; width: 100%; font-size: 1rem;
    }
    
    /* Highlight inputs */
    #importeNetoCobrado { background-color: #d4edda; color: #155724; font-weight: 800; border: 2px solid #28a745; font-size: 1.1rem; }
    
    .nav-actions { display: flex; justify-content: space-between; margin-top: 20px; flex-wrap: wrap; gap: 10px; }
    .form-actions { display: flex; gap: 10px; }
    button { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
    #btnSubmitCourse { background: var(--accent-green); color: white; }
    #btnCancelEdit { background: var(--accent-red); color: white; }

    /* ESTADISTICAS */
    .stats-controls { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .stats-results { display: flex; gap: 40px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 1.1rem; flex-wrap: wrap; }
    .stats-results strong { color: #ffd54f; }

    /* TABLA ESCITORIO (Por defecto) */
    .table-container { width: 100%; overflow-x: auto; }
    .courses-table { width: 100%; border-collapse: collapse; min-width: 1000px; } 
    .courses-table th { background: var(--header-bg); color: #ffd54f; padding: 12px; text-align: left; }
    .courses-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    
    .status-cobrado { color: var(--accent-green); font-weight:700; background: rgba(40, 167, 69, 0.1); padding: 4px 8px; border-radius: 4px; }
    .status-pendiente { color: var(--accent-red); font-weight:700; background: rgba(220, 53, 69, 0.1); padding: 4px 8px; border-radius: 4px; }

    /* BOTONES DE ACCIÓN */
    .action-btns { display: flex; gap: 5px; }
    .action-btns button { padding: 6px 10px; font-size: 0.8rem; }
    .edit-btn { background: #2196f3; color: white; }
    .delete-btn { background: #f44336; color: white; }
    .obs-btn { background: #ff9800; color: white; }

    /* --- ESTILOS MÓVIL (TARJETAS LIMPIAS) --- */
    @media (max-width: 900px) {
        .form-grid { grid-template-columns: 1fr 1fr; }
    }
    
    @media (max-width: 768px) {
        .container { padding: 0 10px; margin-top: 15px; }
        .form-grid { grid-template-columns: 1fr; }
        .toggle-form-container { flex-direction: column; }
        #btnToggleForm, #btnMainMenu { width: 100%; }
        
        /* Ocultar cabecera de tabla */
        .courses-table thead { display: none; }
        .courses-table, .courses-table tbody, .courses-table tr, .courses-table td { display: block; width: 100%; }
        
        /* TRANSFORMACIÓN A TARJETA */
        .courses-table tr {
            background: #2d2d44;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            padding: 0; /* Padding controlado por celdas */
            overflow: hidden;
        }

        /* CELDA: CABECERA DE TARJETA (Siempre visible) */
        .courses-table td:nth-child(3) { /* Nombre Curso */
            padding: 15px 15px 5px 15px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            border-bottom: none;
        }
        
        .courses-table td:nth-child(2) { /* Fecha */
            padding: 0 15px 15px 15px;
            font-size: 0.9rem;
            color: #aaa;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .courses-table td:nth-child(7) { /* Importe */
            position: absolute;
            top: 15px;
            right: 40px; /* Espacio para flecha */
            padding: 0;
            font-weight: 800;
            font-size: 1.1rem;
            color: #ffd54f;
            border: none;
            background: transparent;
        }

        /* FLECHA INDICADORA */
        .courses-table tr::after {
            content: '▼';
            position: absolute;
            top: 18px;
            right: 15px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            transition: transform 0.3s;
        }
        .courses-table tr.expanded::after { transform: rotate(180deg); }

        /* CELDAS OCULTAS (DESPLEGABLES) */
        .courses-table td:nth-child(1), /* ID */
        .courses-table td:nth-child(4), /* Pagador */
        .courses-table td:nth-child(5), /* Lugar */
        .courses-table td:nth-child(6), /* Horas */
        .courses-table td:nth-child(8), /* Pago */
        .courses-table td:nth-child(9), /* Cobro */
        .courses-table td:nth-child(10), /* Renta */
        .courses-table td:nth-child(11)  /* Acciones */
        {
            display: none; /* Oculto por defecto */
            padding: 8px 15px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.1);
        }

        /* Etiquetas para datos desplegados */
        .courses-table td:nth-child(4)::before { content: "Pagador: "; font-weight: bold; color: #888; }
        .courses-table td:nth-child(5)::before { content: "Lugar: "; font-weight: bold; color: #888; }
        .courses-table td:nth-child(6)::before { content: "Horas: "; font-weight: bold; color: #888; }
        .courses-table td:nth-child(8)::before { content: "Estado: "; font-weight: bold; color: #888; }
        .courses-table td:nth-child(9)::before { content: "Fecha Cobro: "; font-weight: bold; color: #888; }
        .courses-table td:nth-child(10)::before { content: "Renta: "; font-weight: bold; color: #888; }

        /* MOSTRAR AL EXPANDIR */
        .courses-table tr.expanded td { display: block; }
        
        /* BOTONES DE ACCIÓN (Al final de la tarjeta) */
        .courses-table td:nth-child(11) {
            background: transparent;
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .courses-table tr.expanded .action-btns {
            display: flex;
            width: 100%;
            gap: 10px;
        }
        .courses-table tr.expanded .action-btns button {
            flex: 1; /* Botones ocupan todo el ancho */
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
        }
    }

    /* Modal obs */
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:2000; }
    .modal-content { background:#fff; color:#333; padding:20px; border-radius:10px; max-width:500px; width:90%; position: relative;}
    .close-modal { position: absolute; top:10px; right:10px; background:#ddd; color:#333; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-weight: bold;}
    
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 1.2rem; flex-direction: column; gap: 15px; }
    #app-container { display: none; }
  </style>
</head>
<body>

<div id="loading-overlay">Cargando datos seguros...</div>

<div class="container" id="app-container">
  <h1>Control de Cursos</h1>

  <div class="toggle-form-container">
    <button id="btnMainMenu" onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Inicio</button>
    <button id="btnToggleForm"><i class="fas fa-plus-circle"></i> Nuevo Curso</button>
  </div>

  <div id="stats-card" class="card">
    <div class="stats-controls">
        <div style="flex:1">
            <label>Filtrar Año:</label>
            <select id="filterInicioYear" onchange="renderStats(); render()"><option value="">TODOS</option></select>
        </div>
        <div style="flex:1">
            <label>Filtrar Pagador:</label>
            <select id="filterPagador" onchange="renderStats(); render()"><option value="">TODOS</option></select>
        </div>
    </div>
    <div class="stats-results">
        <div>Total Neto: <strong id="totalImporte">0,00 €</strong></div>
        <div>Total Horas: <strong id="totalHoras">0,00 h</strong></div>
    </div>
  </div>

  <div class="card" style="padding: 10px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding: 0 10px;">
        <h2 style="margin:0; font-size:1.2rem;">Listado</h2>
        <button onclick="exportToExcel()" style="background:var(--accent-green); color:white; padding:5px 10px; font-size:0.9rem;"><i class="fas fa-file-excel"></i> Excel</button>
    </div>
    
    <div class="table-container">
        <table class="courses-table">
          <thead>
            <tr><th>#</th><th>Inicio</th><th>Curso</th><th>Pagador</th><th>Lugar</th><th>Horas</th><th>Importe</th><th>Estado</th><th>Cobro</th><th>Renta</th><th>Acciones</th></tr>
          </thead>
          <tbody id="coursesTableBody"></tbody>
        </table>
    </div>
  </div>
</div>

<div id="data-entry-form">
    <div class="modal-content-wrapper">
        <h2 style="color:#ffd54f; margin-bottom:20px;">Editar/Crear Curso</h2>
        <form id="courseForm">
        <input type="hidden" id="courseKey">
        
        <div class="form-grid">
            <div class="form-group" style="grid-column: 1/-1;"><label>Nombre del Curso</label><input type="text" id="nombreCurso" required placeholder="Nombre del curso..."></div>
            <div class="form-group"><label>Inicio</label><input type="date" id="inicio" required></div>
            <div class="form-group"><label>Fin</label><input type="date" id="fin" required></div>
            <div class="form-group"><label>Pagador</label><input type="text" id="pagador" list="pagadoresListForm" required><datalist id="pagadoresListForm"></datalist></div>
            <div class="form-group"><label>Tipo</label><input type="text" id="tipoCurso" list="tipoCursosListForm"><datalist id="tipoCursosListForm"></datalist></div>
            
            <div class="form-group"><label>Horas</label><input type="text" id="horas" onblur="formatNumericDisplay(this); calculateFromHours();"></div>
            <div class="form-group"><label>Precio/Hora</label><input type="text" id="precioHoraBruto" onblur="formatNumericDisplay(this); calculateFromPrice();"></div>
            <div class="form-group"><label>Base (€)</label><input type="text" id="importeBase" onblur="formatNumericDisplay(this); calculateFromBase();"></div>
            <div class="form-group"><label>KM (€)</label><input type="text" id="kilometraje" onblur="formatNumericDisplay(this); calculateTotals();"></div>
            
            <div class="form-group"><label>IRPF (%)</label><input type="text" id="irpf" onblur="formatNumericDisplay(this); calculateTotals();"></div>
            <div class="form-group"><label>Total Neto (€)</label><input type="text" id="importeNetoCobrado" readonly></div>
            
            <div class="form-group"><label>Estado</label><select id="cobrado"><option value="PENDIENTE">PENDIENTE</option><option value="COBRADO">COBRADO</option></select></div>
            <div class="form-group"><label>Fecha Cobro</label><input type="text" id="fechaCobro"></div>
            <div class="form-group"><label>Lugar</label><input type="text" id="lugarCelebracion"></div>
            <div class="form-group"><label>Renta (Año)</label><input type="number" id="renta"></div>
            
            <div class="form-group" style="grid-column: 1/-1;"><label>Observaciones</label><textarea id="observaciones"></textarea></div>
            
            <div class="form-group" style="grid-column: 1/-1;">
               <div style="display:flex; align-items:center; gap:10px;">
                   <input type="checkbox" id="alerta" style="width:20px; height:20px;"> 
                   <label for="alerta" style="margin:0; color:#fff;">Marcar incidencia</label>
               </div>
            </div>
            
            <input type="hidden" id="importeBruto">
            <input type="hidden" id="importeHoraNeto">
            <input type="hidden" id="horario">
            <input type="hidden" id="asistentes">
        </div>

        <div class="nav-actions">
            <button type="button" onclick="closeFormModal()" style="background:#555; color:white;">Cancelar</button>
            <button type="submit" id="btnSubmitCourse">Guardar</button>
        </div>
        </form>
    </div>
</div>

<div id="obsModal" class="modal">
  <div class="modal-content">
    <button class="close-modal" onclick="closeObsModal()">X</button>
    <h3>Detalles</h3>
    <div id="obsText"></div>
  </div>
</div>

<script>
// CONFIGURACIÓN FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyD4hCPs_xAHkRroAhk3me5pGnF0Bf81AGw",
    authDomain: "markarma279.firebaseapp.com",
    databaseURL: "https://markarma279-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "markarma279",
    messagingSenderId: "280620278315",
    appId: "1:280620278315:web:42adbb1aacb3ac2239806e"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let USER_ID = null;
let userDataRef = null;
let courses = [];
let masterCompanies = []; 
let masterTiposCurso = [];

// ELEMENTOS DOM
const tbody = document.getElementById('coursesTableBody');
const formModal = document.getElementById('data-entry-form');
const filterInicioYear = document.getElementById('filterInicioYear');
const filterPagador = document.getElementById('filterPagador');

// AUTENTICACIÓN
auth.onAuthStateChanged((user) => {
    if (user) {
        USER_ID = user.email.replace(/\./g, ',');
        userDataRef = db.ref('formacion/' + USER_ID);
        cargarDatos();
    } else {
        window.location.href = "index.html";
    }
});

function cargarDatos() {
    userDataRef.child('cursos').once('value').then(snapshot => {
        if (!snapshot.exists()) {
            // Intentar migrar si está vacío
            db.ref('FORMACION').once('value').then(old => {
                if(old.exists()) {
                    userDataRef.child('cursos').set(old.val()).then(() => location.reload());
                } else {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('app-container').style.display = 'block';
                    load();
                }
            });
        } else {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            load();
        }
    });
}

async function load() {
    const snap = await userDataRef.child('cursos').once('value');
    const data = snap.val();
    courses = [];
    if(data) {
        for(let key in data) {
            courses.push({key, ...data[key]});
        }
    }
    courses.sort((a,b) => new Date(b.inicio) - new Date(a.inicio));
    
    // Cargar Maestros
    const compSnap = await userDataRef.child('empresas').once('value');
    masterCompanies = compSnap.val() || [];
    const typeSnap = await userDataRef.child('tipos').once('value');
    masterTiposCurso = typeSnap.val() || [];
    
    // Update Dropdowns
    const years = new Set(courses.map(c => c.inicio ? c.inicio.split('-')[0] : '').filter(y=>y));
    filterInicioYear.innerHTML = '<option value="">TODOS</option>' + [...years].sort((a,b)=>b-a).map(y=>`<option value="${y}">${y}</option>`).join('');
    
    const payers = new Set(courses.map(c => c.empresa || c.pagador).filter(p=>p));
    filterPagador.innerHTML = '<option value="">TODOS</option>' + [...payers].sort().map(p=>`<option value="${p}">${p}</option>`).join('');
    
    document.getElementById('pagadoresListForm').innerHTML = [...payers].map(p=>`<option value="${p}">`).join('');
    document.getElementById('tipoCursosListForm').innerHTML = masterTiposCurso.map(t=>`<option value="${t}">`).join('');

    renderStats();
    render();
}

function renderStats() {
    const y = filterInicioYear.value;
    const p = filterPagador.value;
    const filtered = courses.filter(c => 
        c.cobrado === 'COBRADO' && 
        (y === '' || c.inicio.startsWith(y)) &&
        (p === '' || (c.empresa || c.pagador) === p)
    );
    
    const imp = filtered.reduce((acc, c) => acc + (parseFloat(c.importeNeto)||0), 0);
    const hrs = filtered.reduce((acc, c) => acc + (parseFloat(c.horas)||0), 0);
    
    document.getElementById('totalImporte').textContent = imp.toFixed(2).replace('.', ',') + ' €';
    document.getElementById('totalHoras').textContent = hrs.toFixed(2).replace('.', ',') + ' h';
}

function render() {
    const y = filterInicioYear.value;
    const p = filterPagador.value;
    const filtered = courses.filter(c => 
        (y === '' || c.inicio.startsWith(y)) &&
        (p === '' || (c.empresa || c.pagador) === p)
    );

    if(filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:20px;">Sin resultados</td></tr>'; return; }

    tbody.innerHTML = filtered.map((c, i) => {
        const statusClass = c.cobrado === 'COBRADO' ? 'status-cobrado' : 'status-pendiente';
        const importe = parseFloat(c.importeNeto).toFixed(2).replace('.', ',');
        const alert = c.alerta ? 'border-left: 4px solid red;' : '';
        
        // onclick toggle para desplegar en móvil
        return `<tr onclick="this.classList.toggle('expanded')" style="${alert}">
            <td>${i+1}</td>
            <td>${c.inicio}</td>
            <td>${c.nombreCurso || c.tituloCurso}</td>
            <td>${c.empresa || c.pagador}</td>
            <td>${c.lugarCelebracion}</td>
            <td>${c.horas}</td>
            <td>${importe} €</td>
            <td><span class="${statusClass}">${c.cobrado}</span></td>
            <td>${c.fechaCobro || ''}</td>
            <td>${c.renta || ''}</td>
            <td>
                <div class="action-btns">
                    <button class="obs-btn" onclick="event.stopPropagation(); showObs('${c.key}')"><i class="fas fa-eye"></i></button>
                    <button class="edit-btn" onclick="event.stopPropagation(); editCourse('${c.key}')"><i class="fas fa-edit"></i></button>
                    <button class="delete-btn" onclick="event.stopPropagation(); delCourse('${c.key}')"><i class="fas fa-trash"></i></button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

// FORM LOGIC
document.getElementById('btnToggleForm').onclick = () => {
    document.getElementById('courseForm').reset();
    document.getElementById('courseKey').value = '';
    formModal.classList.add('visible');
};

function closeFormModal() { formModal.classList.remove('visible'); }

// CÁLCULOS AUTOMÁTICOS
function getVal(id) { return parseFloat(document.getElementById(id).value.replace(',','.')) || 0; }
function setVal(id, val) { document.getElementById(id).value = val.toFixed(2).replace('.', ','); }

window.formatNumericDisplay = (el) => { el.value = parseFloat(el.value.replace(',','.')).toFixed(2).replace('.',','); }

window.calculateTotals = () => {
    const base = getVal('importeBase');
    const km = getVal('kilometraje');
    const irpf = getVal('irpf');
    const h = getVal('horas');
    
    const bruto = base + km;
    const ret = base * (irpf/100);
    const neto = (base - ret) + km;
    
    setVal('importeBruto', bruto);
    setVal('importeNetoCobrado', neto);
    if(h>0) setVal('precioHoraBruto', base/h);
};

window.calculateFromHours = () => {
    const h = getVal('horas');
    const p = getVal('precioHoraBruto');
    if(h>0 && p>0) setVal('importeBase', h*p);
    calculateTotals();
};

window.calculateFromPrice = calculateFromHours; // Mismo efecto
window.calculateFromBase = calculateTotals; // Si cambia base, recalcula todo

// GUARDAR
document.getElementById('courseForm').onsubmit = async (e) => {
    e.preventDefault();
    const key = document.getElementById('courseKey').value;
    const data = {
        nombreCurso: document.getElementById('nombreCurso').value,
        inicio: document.getElementById('inicio').value,
        fin: document.getElementById('fin').value,
        empresa: document.getElementById('pagador').value,
        pagador: document.getElementById('pagador').value,
        tipoCurso: document.getElementById('tipoCurso').value,
        horas: getVal('horas'),
        precioHoraBruto: getVal('precioHoraBruto'),
        importeBase: getVal('importeBase'),
        kilometraje: getVal('kilometraje'),
        irpf: getVal('irpf'),
        importeBruto: getVal('importeBruto'),
        importeNeto: getVal('importeNetoCobrado'),
        cobrado: document.getElementById('cobrado').value,
        fechaCobro: document.getElementById('fechaCobro').value,
        lugarCelebracion: document.getElementById('lugarCelebracion').value,
        renta: document.getElementById('renta').value,
        observaciones: document.getElementById('observaciones').value,
        alerta: document.getElementById('alerta').checked
    };

    if(key) await userDataRef.child('cursos').child(key).update(data);
    else await userDataRef.child('cursos').push(data);
    
    closeFormModal();
    load();
};

// ACCIONES
window.editCourse = (key) => {
    const c = courses.find(x => x.key === key);
    document.getElementById('courseKey').value = key;
    document.getElementById('nombreCurso').value = c.nombreCurso;
    document.getElementById('inicio').value = c.inicio;
    document.getElementById('fin').value = c.fin;
    document.getElementById('pagador').value = c.empresa || c.pagador;
    document.getElementById('tipoCurso').value = c.tipoCurso;
    setVal('horas', parseFloat(c.horas));
    setVal('precioHoraBruto', parseFloat(c.precioHoraBruto));
    setVal('importeBase', parseFloat(c.importeBase));
    setVal('kilometraje', parseFloat(c.kilometraje));
    setVal('irpf', parseFloat(c.irpf));
    setVal('importeBruto', parseFloat(c.importeBruto));
    setVal('importeNetoCobrado', parseFloat(c.importeNeto));
    document.getElementById('cobrado').value = c.cobrado;
    document.getElementById('fechaCobro').value = c.fechaCobro || '';
    document.getElementById('lugarCelebracion').value = c.lugarCelebracion || '';
    document.getElementById('renta').value = c.renta || '';
    document.getElementById('observaciones').value = c.observaciones || '';
    document.getElementById('alerta').checked = c.alerta || false;
    formModal.classList.add('visible');
};

window.delCourse = (key) => {
    if(confirm('¿Borrar curso?')) {
        userDataRef.child('cursos').child(key).remove().then(load);
    }
};

window.showObs = (key) => {
    const c = courses.find(x => x.key === key);
    document.getElementById('obsText').innerHTML = `
        <p><strong>Observaciones:</strong> ${c.observaciones || 'Ninguna'}</p>
        <hr>
        <small>ID: ${key}</small>
    `;
    document.getElementById('obsModal').style.display = 'flex';
};
window.closeObsModal = () => document.getElementById('obsModal').style.display = 'none';

window.exportToExcel = () => {
    let csv = "Nombre;Pagador;Importe Neto;Estado\n";
    courses.forEach(c => csv += `"${c.nombreCurso}";"${c.empresa}";${c.importeNeto};${c.cobrado}\n`);
    const blob = new Blob(["\ufeff"+csv], {type: 'text/csv;charset=utf-8;'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = "cursos.csv";
    link.click();
};
</script>
