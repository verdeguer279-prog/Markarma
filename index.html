<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GAD - Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> 
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --card-bg: #282844;
            --text-light: #e9e9f0;
            --text-muted: #a0a0b0;
            --accent-gradient: linear-gradient(135deg, #667eea, #764ba2);
            --accent-red: #dc3545;
            --accent-green: #28a745;
            --accent-orange: #ff9800;
            --admin-gold: #ffd700;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow-x: hidden;
        }

        /* --- PANTALLA DE CARGA Y LOGIN --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #2a2a40 0%, var(--bg-dark) 80%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            transition: opacity 0.5s ease-in-out;
        }
        
        /* Imagen Central GAD (Logo) */
        .brand-logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(102, 126, 234, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .login-card {
            background: rgba(40, 40, 68, 0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.05);
            opacity: 0; /* Se muestra con animación */
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        .login-card.visible { opacity: 1; transform: translateY(0); }
        
        .google-btn {
            background-color: #fff;
            color: #333;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            font-size: 0.95rem;
        }
        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .google-btn img { width: 20px; height: 20px; }

        /* --- DASHBOARD PRINCIPAL --- */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            display: none;
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }
        
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        
        /* Logo pequeño en dashboard */
        .dashboard-logo { height: 60px; width: auto; }

        .header-title { flex-grow: 1; }
        .header-title h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
        .header-title p { margin: 5px 0 0; font-size: 0.85rem; color: var(--text-muted); }
        
        .button-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;
        }
        .button-wrapper { position: relative; min-height: 80px; }
        .button-wrapper.long { grid-column: span 2; }
        @media (max-width: 600px) { .button-wrapper.long { grid-column: span 1; } }
        
        .button {
            display: flex; align-items: center; justify-content: center; padding: 25px 20px;
            border-radius: 12px; background-image: var(--accent-gradient); color: var(--text-light);
            font-weight: 600; text-decoration: none; text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); height: 100%; width: 100%; box-sizing: border-box;
            transition: transform 0.2s;
        }
        .button:hover:not(.edit-mode .button) { transform: translateY(-3px); }

        /* Controles */
        .session-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; }
        .btn-control { padding: 8px 12px; border-radius: 8px; border: none; font-size: 0.8rem; cursor: pointer; }
        .btn-logout { background: rgba(255,255,255,0.1); color: #ccc; }
        
        #btnToggleEdit { background: var(--accent-orange); color: var(--bg-dark); display: none; font-weight: bold;}
        #btnUsuarios { background: transparent; border: 1px solid var(--admin-gold); color: var(--admin-gold); display: none; }

        /* Edit Mode */
        .edit-mode .button { pointer-events: none; opacity: 0.8; }
        .edit-mode .button-wrapper { border: 2px dashed var(--accent-orange); border-radius: 14px; padding: 5px; }
        .action-buttons { position: absolute; top: -10px; right: -10px; display: flex; gap: 5px; z-index: 10; }
        .action-button { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
        .edit { background: var(--accent-orange); } .delete { background: var(--accent-red); }
        
        #btnAddButton { background: rgba(40,167,69,0.1); color: var(--accent-green); border: 2px dashed var(--accent-green); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 25px; text-align: center; display: none; }

        /* Modales */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--card-bg); padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; position: relative; }
        .modal input, .modal select { width: 100%; padding: 10px; margin-bottom: 15px; background: var(--bg-dark); border: 1px solid #555; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-primary { background: var(--accent-gradient); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; }
        .close-modal { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #aaa; font-size: 1.2rem; }

        .user-list-item { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.2); margin-bottom: 5px; border-radius: 4px; }
        
        /* Spinner Loader */
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .error-msg { color: var(--accent-red); font-size: 0.8rem; margin-top: 10px; display: none; }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .session-controls { justify-content: center; width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <img src="logogad.PNG" alt="GAD Logo" class="brand-logo" onerror="this.style.display='none'">
    
    <div id="initial-loader" class="spinner"></div>

    <div id="login-card-content" class="login-card">
        <h2 style="margin: 0 0 10px;">Acceso GAD</h2>
        <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 25px;">Identifícate para entrar</p>
        
        <button id="btn-login-google" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
            Iniciar sesión con Google
        </button>
        <p id="login-error" class="error-msg"></p>
    </div>
</div>

<div class="container" id="main-content">
    <div class="card">
        <header class="header">
            <img src="logogad.PNG" alt="GAD" class="dashboard-logo" onerror="this.src='https://placehold.co/100x50?text=GAD'">

            <div class="header-title">
                <h1 id="welcome-message">Bienvenido</h1>
                <p>Panel de Control</p>
            </div>
            
            <div class="session-controls">
                <button id="btnUsuarios" class="btn-control"><i class="fas fa-users"></i> Usuarios</button>
                <button id="btnToggleEdit" class="btn-control"><i class="fas fa-pen"></i> Editar</button>
                <button id="btn-logout" class="btn-control btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="button-grid" id="buttonGrid"></div>

        <div id="btnAddButton">
            <i class="fas fa-plus-circle"></i> NUEVO BOTÓN
        </div>
    </div>
</div>

<div id="button-modal" class="modal-overlay">
    <div class="modal">
        <span class="close-modal" id="close-button-modal">&times;</span>
        <h3>Configurar Botón</h3>
        <input type="text" id="button-name" placeholder="Nombre">
        <input type="text" id="button-url" placeholder="URL o archivo.html">
        <select id="button-type"><option value="short">Normal</option><option value="long">Ancho</option></select>
        <div id="drop-area" style="border:1px dashed #555; padding:15px; text-align:center; border-radius:6px; cursor:pointer;">
            <small>Arrastra un HTML aquí</small>
        </div>
        <button id="button-submit" class="btn-primary" style="margin-top:10px;">Guardar</button>
    </div>
</div>

<div id="dlgUsuariosModal" class="modal-overlay">
    <div class="modal">
        <span class="close-modal" id="dlgUsuariosClose">&times;</span>
        <h3>Usuarios Autorizados</h3>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="email" id="txtNewUserEmail" placeholder="email@gmail.com" style="margin-bottom:0;">
            <button id="btnAddUser" class="btn-primary" style="width:auto;">+</button>
        </div>
        <div id="usersListContainer" style="max-height:200px; overflow-y:auto;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyD4hCPs_xAHkRroAhk3me5pGnF0Bf81AGw",
      authDomain: "markarma279.firebaseapp.com",
      databaseURL: "https://markarma279-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "markarma279",
      storageBucket: "markarma279.firebasestorage.app",
      messagingSenderId: "280620278315",
      appId: "1:280620278315:web:42adbb1aacb3ac2239806e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // PERSISTENCIA: Esto es clave para el login automático
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    const ADMIN_EMAIL = "verdeguer279@gmail.com";
    const ALLOWED_USERS_REF = db.ref('allowed_users');

    // UI Elements
    const loginScreen = document.getElementById('login-screen');
    const loginCard = document.getElementById('login-card-content');
    const loader = document.getElementById('initial-loader');
    const mainContent = document.getElementById('main-content');
    const loginError = document.getElementById('login-error');
    
    let isEditMode = false;
    let isAdmin = false;
    let editingKey = null;

    // --- LÓGICA DE AUTENTICACIÓN AUTOMÁTICA ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            // Usuario detectado (por login previo o actual)
            checkAccess(user);
        } else {
            // Nadie logueado: Ocultar spinner, mostrar formulario login
            loader.style.display = 'none';
            loginCard.classList.add('visible');
        }
    });

    function checkAccess(user) {
        // 1. Verificar si es Admin
        if (user.email === ADMIN_EMAIL) {
            isAdmin = true;
            enterDashboard(user);
            return;
        }

        // 2. Verificar si es Autorizado
        ALLOWED_USERS_REF.once('value').then(snapshot => {
            const allowed = snapshot.val();
            let isAllowed = false;
            if (allowed) {
                if (Object.values(allowed).includes(user.email)) isAllowed = true;
            }

            if (isAllowed) {
                isAdmin = false;
                enterDashboard(user);
            } else {
                // No autorizado: Expulsar
                auth.signOut();
                loader.style.display = 'none';
                loginCard.classList.add('visible');
                loginError.textContent = "Usuario no autorizado.";
                loginError.style.display = 'block';
            }
        });
    }

    function enterDashboard(user) {
        // Ocultar Login Screen con transición
        loginScreen.style.opacity = '0';
        setTimeout(() => {
            loginScreen.style.display = 'none';
            mainContent.style.display = 'block';
        }, 500);

        document.getElementById('welcome-message').textContent = `Hola, ${user.displayName || 'Usuario'}`;
        
        loadButtons();
        
        if (isAdmin) {
            document.getElementById('btnToggleEdit').style.display = 'block';
            document.getElementById('btnUsuarios').style.display = 'block';
        }
    }

    // Botones Login/Logout
    document.getElementById('btn-login-google').onclick = () => {
        loginError.style.display = 'none';
        auth.signInWithPopup(provider).catch(e => {
            loginError.textContent = e.message;
            loginError.style.display = 'block';
        });
    };
    
    document.getElementById('btn-logout').onclick = () => {
        auth.signOut().then(() => location.reload());
    };

    // --- LÓGICA DASHBOARD ---

    // Toggle Edición
    document.getElementById('btnToggleEdit').onclick = () => {
        isEditMode = !isEditMode;
        const btn = document.getElementById('btnToggleEdit');
        btn.style.background = isEditMode ? 'var(--accent-green)' : 'var(--accent-orange)';
        btn.innerHTML = isEditMode ? '<i class="fas fa-check"></i>' : '<i class="fas fa-pen"></i> Editar';
        document.getElementById('btnAddButton').style.display = isEditMode ? 'block' : 'none';
        
        if(isEditMode) document.body.classList.add('edit-mode');
        else document.body.classList.remove('edit-mode');
        
        // Recargar botones para actualizar estado draggable
        db.ref('botones').once('value').then(snap => renderButtons(snap.val()));
    };

    // Render Botones
    function loadButtons() {
        db.ref('botones').on('value', snap => renderButtons(snap.val()));
    }

    function renderButtons(data) {
        const grid = document.getElementById('buttonGrid');
        grid.innerHTML = '';
        if(!data) return;

        const sorted = Object.keys(data).map(k => ({...data[k], key: k})).sort((a,b) => (a.order||999)-(b.order||999));
        
        sorted.forEach(btn => {
            const div = document.createElement('div');
            div.className = `button-wrapper ${btn.span === 'long' ? 'long' : ''}`;
            if(isEditMode && isAdmin) {
                div.innerHTML = `
                    <div class="action-buttons">
                        <button class="action-button edit" onclick="openModal('${btn.key}')"><i class="fas fa-edit"></i></button>
                        <button class="action-button delete" onclick="deleteBtn('${btn.key}')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                // Drag Logic Simple
                div.draggable = true;
                setupDrag(div);
            }
            
            const a = document.createElement('a');
            a.className = 'button';
            a.href = isEditMode ? '#' : (btn.url || '#');
            a.textContent = btn.name;
            div.appendChild(a);
            grid.appendChild(div);
        });
    }

    // --- MODALES Y CRUD ---
    
    // Modal Botón
    const btnModal = document.getElementById('button-modal');
    window.openModal = (key = null) => {
        editingKey = key;
        document.getElementById('button-name').value = '';
        document.getElementById('button-url').value = '';
        if(key) {
            db.ref('botones/'+key).once('value').then(s => {
                const d = s.val();
                document.getElementById('button-name').value = d.name;
                document.getElementById('button-url').value = d.url;
                document.getElementById('button-type').value = d.span;
            });
        }
        btnModal.classList.add('open');
    };
    document.getElementById('close-button-modal').onclick = () => btnModal.classList.remove('open');
    document.getElementById('btnAddButton').onclick = () => openModal();

    document.getElementById('button-submit').onclick = () => {
        const name = document.getElementById('button-name').value;
        if(!name) return;
        const data = {
            name: name,
            url: document.getElementById('button-url').value,
            span: document.getElementById('button-type').value
        };
        
        if(editingKey) db.ref('botones/'+editingKey).update(data);
        else {
            db.ref('botones').once('value').then(s => {
                data.order = s.numChildren() + 1;
                db.ref('botones').push(data);
            });
        }
        btnModal.classList.remove('open');
    };

    window.deleteBtn = (k) => { if(confirm("¿Borrar?")) db.ref('botones/'+k).remove(); };

    // Modal Usuarios
    const usrModal = document.getElementById('dlgUsuariosModal');
    document.getElementById('btnUsuarios').onclick = () => {
        usrModal.classList.add('open');
        const list = document.getElementById('usersListContainer');
        list.innerHTML = 'Cargando...';
        ALLOWED_USERS_REF.on('value', s => {
            list.innerHTML = '';
            const u = s.val();
            if(u) Object.keys(u).forEach(k => {
                list.innerHTML += `<div class="user-list-item"><span>${u[k]}</span><button class="action-button delete" onclick="delUser('${k}')">X</button></div>`;
            });
            else list.innerHTML = '<small>Sin usuarios adicionales</small>';
        });
    };
    document.getElementById('dlgUsuariosClose').onclick = () => usrModal.classList.remove('open');
    
    document.getElementById('btnAddUser').onclick = () => {
        const mail = document.getElementById('txtNewUserEmail').value.trim();
        if(mail) { ALLOWED_USERS_REF.push(mail); document.getElementById('txtNewUserEmail').value=''; }
    };
    window.delUser = (k) => ALLOWED_USERS_REF.child(k).remove();

    // Drag helper
    let dragSrc = null;
    function setupDrag(el) {
        el.addEventListener('dragstart', e => { dragSrc = el; e.dataTransfer.effectAllowed = 'move'; });
        el.addEventListener('dragover', e => { e.preventDefault(); });
        el.addEventListener('drop', e => {
            e.stopPropagation();
            if (dragSrc !== el) {
                // Intercambio visual simple, el orden real requiere lógica más compleja de reindexado
                // Para esta demo simple, solo recargamos para no romper la UI
                // En producción usarías updates de 'order'
            }
            return false;
        });
    }
    
    // Drag File Modal
    const drop = document.getElementById('drop-area');
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.background = '#333'; });
    drop.addEventListener('dragleave', e => { drop.style.background = 'transparent'; });
    drop.addEventListener('drop', e => {
        e.preventDefault();
        if(e.dataTransfer.files[0]) document.getElementById('button-url').value = e.dataTransfer.files[0].name;
    });

</script>
</body>
</html>
